services:
  app:
    build: .
    container_name: lab6-app
    environment:
      MODE: docker-compose
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: lab6
      DB_USER: lab6user
      DB_PASSWORD: lab6pass
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: lab6-db
    environment:
      POSTGRES_DB: lab6
      POSTGRES_USER: lab6user
      POSTGRES_PASSWORD: lab6pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab6user -d lab6"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
